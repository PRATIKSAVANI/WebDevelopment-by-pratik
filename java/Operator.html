<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        //1. arithmetic Operators = - , + , * , / , % - Remainder 

        var a = 10
        var b = 5

        console.log(a+b)
        console.log(a-b)
        console.log(a*b)
        console.log(a/b)
        console.log(a%b)

        //2. Assignment - assin  Value : "="

        var x = 10  // Value 10 has been assignedt variable x
        
        console.log(x+=5) 
        console.log(x-=3)

        // Compariosn

        var p = 25
        var q = 20

        console.log(p>q);  // 25 > 20 = true
        console.log(p<q);  // 25<20 = false 
        console.log(p>=q); // 25>=20 = true 
        console.log(p<=q); //25<=20 = true

        const height1 = "170"
        const height2 = 170

        // == only check the value 
        console.log(height1 == height2)

        // === checks value and data types
        console.log(height1 === height2)

        // Logical Operator - AND , OR , NEGATION 
    </script>
</body>
</html>
