<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        // Switch - Changing Through diffrent cases \

        // vending machine
        
        let choice = 4   // <-- enter your number as per the your choice.  

        switch(choice){
            // Diffrent cases

            case 1:
                console.log("chips")
                break;

            case 2:
                console.log("chocolate")
                break;

            case 3:
                console.log("cola")
                break;

            case 4:
                console.log("coffe")
                break;

            case 5:
                console.log("Biscuit")
                break;

            case 6:
                console.log("cake")
                break;

            case 7:
                console.log("chips")
                break;

            default:
                console.log("Invalid Choice")



                
        }
    </script>
</body>
</html>
